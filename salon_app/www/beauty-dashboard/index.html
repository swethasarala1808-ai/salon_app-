<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Beauty Parlor Dashboard</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Manrope',sans-serif;background:#0f0609;color:white;min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:20px}
.logo{font-family:serif;font-size:2em;color:#d4a847}
p{color:rgba(255,255,255,.5);font-size:.9em}
a{color:#d4a847;text-decoration:none;padding:12px 28px;border:1px solid #d4a847;border-radius:8px;font-size:.88em;transition:all .2s}
a:hover{background:#d4a847;color:#000}
.links{display:flex;gap:12px;flex-wrap:wrap;justify-content:center}
</style>
</head>
<body>
<div class="logo">🌸 Beauty Parlor Dashboard</div>
<p>The Beauty Parlor Dashboard is at a separate location</p>
<div class="links">
  <a href="/owner">🌸 Go to Beauty Owner Dashboard</a>
  <a href="/bizaxl">💄 Go to Beauty Customer Site</a>
  <a href="/salon-dashboard">✂ Go to Salon Dashboard</a>
  <a href="/">🏠 Home</a>
</div>
<script>
// Auto redirect to owner after 2 seconds
setTimeout(()=>window.location.href='/owner', 2000);
</script>
</body>
</html>
